<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm vị trí của tôi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --primary-light: #EEF2FF;
            --success: #059669;
            --success-light: #ECFDF5;
            --danger: #DC2626;
            --danger-light: #FEF2F2;
            --warning: #D97706;
            --warning-light: #FFFBEB;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .loading-content {
            background: white;
            border-radius: var(--radius);
            padding: 30px 40px;
            text-align: center;
            box-shadow: var(--shadow-xl);
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: var(--gray-700);
            font-weight: 500;
            font-size: 15px;
        }

        /* Main card */
        .card {
            background: white;
            border-radius: 24px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 32px 28px 24px;
            text-align: center;
            color: white;
        }
        .header-icon {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            backdrop-filter: blur(10px);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 6px;
            font-weight: 400;
        }

        /* Body */
        .body {
            padding: 24px 28px 28px;
        }

        /* Info box */
        .info-box {
            background: #EFF6FF;
            border: 1px solid #BFDBFE;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .info-icon {
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .info-text {
            font-size: 13px;
            color: #1E40AF;
            line-height: 1.5;
        }
        .info-text strong {
            font-weight: 600;
        }

        /* Button */
        .btn-main {
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: -0.2px;
        }
        .btn-main:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.35);
        }
        .btn-main:active {
            transform: translateY(0);
        }
        .btn-main:disabled {
            background: var(--gray-300);
            color: var(--gray-500);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-icon {
            font-size: 20px;
        }

        /* Result area */
        .result {
            margin-top: 20px;
            display: none;
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result.show {
            display: block;
        }

        .result-box {
            border-radius: var(--radius-sm);
            padding: 18px 20px;
            margin-bottom: 12px;
        }
        .result-box.success {
            background: var(--success-light);
            border: 1px solid #A7F3D0;
        }
        .result-box.error {
            background: var(--danger-light);
            border: 1px solid #FECACA;
        }

        .result-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-box.success .result-title { color: var(--success); }
        .result-box.error .result-title { color: var(--danger); }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .result-item {
            background: white;
            border-radius: 8px;
            padding: 12px 14px;
            border: 1px solid var(--gray-200);
        }
        .result-label {
            font-size: 11px;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .result-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-900);
            word-break: break-all;
        }
        .result-value.coords {
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px;
            color: var(--primary);
        }

        /* Map link button */
        .map-link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            background: white;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            color: var(--gray-700);
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .map-link-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        .map-icon {
            font-size: 18px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--gray-400);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 16px;
        }
        .footer span {
            margin: 0 4px;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .card { border-radius: 20px; }
            .header { padding: 24px 20px 20px; }
            .header h1 { font-size: 19px; }
            .body { padding: 20px; }
            .result-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Loading overlay (ẩn mặc định) -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="loading-text">Đang xác định vị trí...</p>
        </div>
    </div>

    <!-- Main card -->
    <div class="card">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">📍</div>
            <h1>Xác định vị trí</h1>
            <p>Chia sẻ vị trí hiện tại của bạn</p>
        </div>

        <!-- Body -->
        <div class="body">
            <!-- Info box -->
            <div class="info-box">
                <span class="info-icon">🔒</span>
                <span class="info-text">
                    Vị trí của bạn sẽ được <strong>bảo mật</strong> và chỉ gửi đến quản trị viên.
                    Bạn có thể <strong>từ chối</strong> bất kỳ lúc nào.
                </span>
            </div>

            <!-- Button -->
            <button class="btn-main" id="locateBtn" onclick="getLocation()">
                <span class="btn-icon">📡</span>
                Chia sẻ vị trí của tôi
            </button>

            <!-- Result -->
            <div class="result" id="resultArea">
                <div class="result-box" id="resultBox">
                    <div class="result-title" id="resultTitle"></div>
                    <div class="result-grid" id="resultGrid"></div>
                    <div id="resultExtra"></div>
                </div>
                <a href="#" class="map-link-btn" id="mapLink" target="_blank" style="display: none;">
                    <span class="map-icon">🗺️</span>
                    Xem trên Google Maps
                    <span style="font-size:12px;">→</span>
                </a>
            </div>

            <!-- Footer -->
            <p class="footer">
                <span>🔒 Bảo mật</span>
                <span>•</span>
                <span>📡 GPS chính xác</span>
                <span>•</span>
                <span>⚡ Tức thì</span>
            </p>
        </div>
    </div>

    <script>
        // ==========================================
        // 👇 THAY LINK WEB APP CỦA BẠN VÀO ĐÂY 👇
        // ==========================================
        const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbypdAsJNs-yMRNi2PdnGjZqmy6N0EeyoHOpPB-UbWGeePtcFxwZTd7NNxwlXjzAF_63xQ/exec";
        // ==========================================

        const btn = document.getElementById('locateBtn');
        const resultArea = document.getElementById('resultArea');
        const resultBox = document.getElementById('resultBox');
        const resultTitle = document.getElementById('resultTitle');
        const resultGrid = document.getElementById('resultGrid');
        const resultExtra = document.getElementById('resultExtra');
        const mapLink = document.getElementById('mapLink');
        const loadingOverlay = document.getElementById('loadingOverlay');

        function getLocation() {
            if (!navigator.geolocation) {
                showError('Trình duyệt của bạn không hỗ trợ định vị.<br>Vui lòng sử dụng Chrome, Safari hoặc Firefox.');
                return;
            }

            // Hiển thị loading
            loadingOverlay.style.display = 'flex';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;margin:0;"></span> Đang xác định...';
            resultArea.classList.remove('show');
            mapLink.style.display = 'none';

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    loadingOverlay.style.display = 'none';
                    
                    const data = {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: Math.round(position.coords.accuracy),
                        timestamp: new Date().toLocaleString("vi-VN")
                    };

                    // Hiển thị kết quả
                    resultBox.className = 'result-box success';
                    resultTitle.innerHTML = '✅ Xác định vị trí thành công';
                    
                    resultGrid.innerHTML = `
                        <div class="result-item">
                            <div class="result-label">Vĩ độ (Latitude)</div>
                            <div class="result-value coords">${data.latitude.toFixed(6)}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Kinh độ (Longitude)</div>
                            <div class="result-value coords">${data.longitude.toFixed(6)}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Độ chính xác</div>
                            <div class="result-value">± ${data.accuracy}m</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Thời gian</div>
                            <div class="result-value" style="font-size:13px;">${data.timestamp}</div>
                        </div>
                    `;
                    
                    resultExtra.innerHTML = '';
                    
                    // Link Google Maps
                    const mapUrl = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;
                    mapLink.href = mapUrl;
                    mapLink.style.display = 'flex';
                    
                    resultArea.classList.add('show');
                    
                    // Update button
                    btn.innerHTML = '<span class="btn-icon">✅</span> Đã chia sẻ vị trí';
                    btn.style.background = '#059669';
                    
                    // Gửi dữ liệu (ngầm, không hiển thị lỗi cho user)
                    sendLocationSilent(data);
                },
                function(error) {
                    loadingOverlay.style.display = 'none';
                    
                    let message = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            message = 'Bạn đã <strong>từ chối</strong> chia sẻ vị trí.<br><small>Vui lòng cấp quyền trong cài đặt trình duyệt và thử lại.</small>';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            message = 'Không thể xác định vị trí.<br><small>Vui lòng bật GPS/WiFi và thử lại.</small>';
                            break;
                        case error.TIMEOUT:
                            message = 'Yêu cầu quá thời gian.<br><small>Vui lòng thử lại.</small>';
                            break;
                        default:
                            message = 'Có lỗi xảy ra. Vui lòng thử lại.';
                    }
                    
                    showError(message);
                    btn.disabled = false;
                    btn.innerHTML = '<span class="btn-icon">🔄</span> Thử lại';
                    btn.style.background = '';
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        function showError(message) {
            resultBox.className = 'result-box error';
            resultTitle.innerHTML = '❌ Lỗi xác định vị trí';
            resultGrid.innerHTML = '';
            resultExtra.innerHTML = `<p style="color:#991B1B;font-size:14px;line-height:1.5;">${message}</p>`;
            mapLink.style.display = 'none';
            resultArea.classList.add('show');
        }

        function sendLocationSilent(data) {
            fetch(WEBAPP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).catch(() => {
                // Lỗi gửi mail không ảnh hưởng đến trải nghiệm người dùng
                console.log('Email sending handled silently');
            });
        }
    </script>
</body>
</html>
